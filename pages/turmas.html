<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <title>SCJ - Gestão de Turmas</title>
  <script src="../assets/js/auth-guard.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-danger mb-4">
  <div class="container">
    <a class="navbar-brand" href="../dashboard.html">← Voltar ao Painel</a>
    <span class="navbar-text">Módulo de Turmas</span>
  </div>
</nav>

<div class="container">
  <div class="card shadow-sm p-4">
    <h5 class="fw-800 mb-4">Nova Turma</h5>
    <form id="formTurma">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nome da Turma (ex: Eucaristia I)</label>
          <input type="text" class="form-control" name="nome" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Catequista Responsável</label>
          <input type="text" class="form-control" name="catequista" required>
        </div>
        <div class="col-12 text-end">
          <button type="submit" class="btn btn-danger">Criar Turma</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  const API_URL = 'https://seu-projeto.vercel.app/api/turmas';

  document.getElementById('formTurma').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd.entries());

    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(data),
      headers: {'Content-Type': 'application/json'}
    });

    if(res.ok) alert("Turma criada com sucesso!");
  });
</script>
</body>
</html>
