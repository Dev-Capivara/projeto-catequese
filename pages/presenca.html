<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <title>SCJ - Chamada Diária</title>
  <script src="../assets/js/auth-guard.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div data-include="../components/navbar.html"></div>

  <div class="container mt-4">
    <div class="glass-card p-4 shadow-sm bg-white rounded-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-800 mb-0">Chamada do Encontro</h4>
        <input type="date" id="data-encontro" class="form-control w-auto border-danger fw-bold">
      </div>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead class="table-light">
            <tr>
              <th>Catequizando</th>
              <th class="text-center">Presença / Falta</th>
            </tr>
          </thead>
          <tbody id="lista-alunos-chamada">
            </tbody>
        </table>
      </div>

      <div class="mt-4">
        <button onclick="salvarChamada()" id="btn-salvar" class="btn btn-danger w-100 py-3 fw-bold shadow">
          <i class="fas fa-save me-2"></i> FINALIZAR CHAMADA
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/include.js"></script>
  <script>
    const API_ALUNOS = '/api/alunos';
    const API_PRESENCA = '/api/presenca';

    // 1. Carregar lista de alunos ao abrir
    async function carregarAlunos() {
      const response = await fetch(API_ALUNOS);
      const alunos = await response.json();
      const container = document.getElementById('lista-alunos-chamada');
      
      container.innerHTML = alunos.map(aluno => `
        <tr class="aluno-row" data-id="${aluno.id}">
          <td class="fw-bold">${aluno.nome}</td>
          <td class="text-center">
            <div class="btn-group" role="group">
              <input type="radio" class="btn-check" name="p-${aluno.id}" id="pres-${aluno.id}" value="P" checked>
              <label class="btn btn-outline-success px-4" for="pres-${aluno.id}">P</label>

              <input type="radio" class="btn-check" name="p-${aluno.id}" id="falta-${aluno.id}" value="F">
              <label class="btn btn-outline-danger px-4" for="falta-${aluno.id}">F</label>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // 2. Coletar dados e enviar ao Backend
    async function salvarChamada() {
      const data = document.getElementById('data-encontro').value;
      if (!data) return alert("Selecione a data do encontro!");

      const rows = document.querySelectorAll('.aluno-row');
      const presencas = Array.from(rows).map(row => ({
        id: row.dataset.id,
        status: row.querySelector('input:checked').value
      }));

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.innerText = "SALVANDO...";

      const res = await fetch(API_PRESENCA, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data_encontro: data, presencas })
      });

      if (res.ok) {
        alert("Chamada salva com sucesso!");
        window.location.href = '../dashboard.html';
      } else {
        alert("Erro ao salvar.");
        btn.disabled = false;
      }
    }

    // Define a data de hoje como padrão
    document.getElementById('data-encontro').valueAsDate = new Date();
    carregarAlunos();
  </script>
</body>
</html>
