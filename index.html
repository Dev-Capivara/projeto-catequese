<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SCJ Pro - Login</title>
<link href="" rel="stylesheet">
<link href="" rel="stylesheet">
<link href="[link suspeito removido]" rel="stylesheet">
<link rel="stylesheet" href="">
<script src=""></script>
<style>
:root { --primary: #b71c1c; --bg: #f4f7f6; --surface: #ffffff; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
.login-container { width: 100%; max-width: 400px; padding: 20px; }
.login-box { background: var(--surface); padding: 40px; border-radius: 20px; border-top: 6px solid var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
.form-control { border-radius: 10px; padding: 12px; border: 1.5px solid #e2e8f0; }
.btn-red { background: var(--primary); color: white; border: none; font-weight: 700; padding: 14px; border-radius: 10px; transition: 0.3s; width: 100%; }
.btn-red:hover { background: #7f0f0f; transform: translateY(-2px); }
</style>
</head>
<body>
<div class="login-container">
<div class="login-box">
<div class="text-center mb-4">
<div class="mx-auto mb-3" style="background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 15px; display: grid; place-items: center; font-weight: 900; font-size: 1.8rem;">SCJ</div>
<h4 style="font-weight: 800; text-align: center;">Bem-vindo</h4>
<p style="color: gray; font-size: 0.8rem; text-align: center;">Sistema de Gestão de Catequese</p>
</div>
<form id="formLogin">
<div class="mb-3">
<label style="font-size: 0.7rem; font-weight: bold; color: gray;">E-MAIL</label>
<input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
</div>
<div class="mb-4">
<label style="font-size: 0.7rem; font-weight: bold; color: gray;">SENHA</label>
<input type="password" id="pass" class="form-control" placeholder="••••••••" required>
</div>
<button type="submit" id="btn-entrar" class="btn-red">ENTRAR NO SISTEMA</button>
</form>
</div>
</div>
<script>
const API_URL = "";
document.getElementById('formLogin').addEventListener('submit', async (e) => {
e.preventDefault();
const email = document.getElementById('email').value;
const pass = document.getElementById('pass').value;
const btn = document.getElementById('btn-entrar');
btn.disabled = true;
btn.innerText = "AUTENTICANDO...";
try {
const response = await fetch(API_URL, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ email: email, senha: pass })
});
const data = await response.json();
if (response.ok) {
sessionStorage.setItem('scj_auth', JSON.stringify(data));
window.location.href = 'sistema.html';
} else {
showError(data.error || "Credenciais invalidas");
btn.disabled = false;
btn.innerText = "ENTRAR NO SISTEMA";
}
} catch (err) {
showError("Erro de conexao.");
btn.disabled = false;
btn.innerText = "ENTRAR NO SISTEMA";
}
});
function showError(msg) {
Toastify({
text: msg,
duration: 3000,
gravity: "top",
position: "right",
style: { background: "#dc2626" }
}).showToast();
}
</script>
</body>
</html>
